<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Projects — Tanak Solanki</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="index.html"><span class="logo">TS</span></a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="projects.html" class="active">Projects</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

<main class="container content">
  <h1>Projects</h1>
  <p>All of my repositories automatically load from GitHub below:</p>

  <div id="github-projects" class="project-grid"></div>
</main>

<script src="js/chatbot.js"></script>
<script>
  // Auto-fetch public repos from GitHub
  fetch('https://api.github.com/users/tanak-pixel/repos?sort=updated')
    .then(res => res.json())
    .then(repos => {
      const container = document.getElementById('github-projects');
      repos.forEach(repo => {
        const card = document.createElement('a');
        card.className = 'project-card';
        card.href = repo.html_url;
        card.target = '_blank';
        card.innerHTML = `
          <h3>${repo.name}</h3>
          <p>${repo.description || 'No description provided.'}</p>
          <div class="text-muted" style="font-size:12px;">⭐ ${repo.stargazers_count} | ${repo.language || 'HTML'}</div>
        `;
        container.appendChild(card);
      });
    })
    .catch(err => {
      document.getElementById('github-projects').innerHTML = '<p>Failed to load repositories.</p>';
      console.error(err);
    });
</script>

  <script src="js/chatbot.js"></script>
</body>
</html>
